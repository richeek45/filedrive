# HTTP - Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name 34.101.234.31.sslip.io; # You can keep this or use _ to catch all

    # Redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Proxy logic
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 34.101.234.31.sslip.io;

    # SSL Certificates (Mounted via Docker volumes)
    ssl_certificate     /etc/letsencrypt/live/34.101.234.31.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/34.101.234.31.sslip.io/privkey.pem;

    # Optimization: Standard SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /api/ {
        # 'go_backend' must match your service name in docker-compose.yml
        proxy_pass http://go_backend:8000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Identity Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; # Will be 'https'

        # Fix for Cross-Domain Cookies (OAuth State/Session)
        # This dynamically maps the backend domain to your frontend domain
        # proxy_cookie_domain $host filedrive-ctx.pages.dev;
        proxy_cookie_domain localhost $host;
        proxy_cookie_domain 127.0.0.1 $host;
        proxy_cookie_path / "/; SameSite=None; Secure";

        # CORS Headers for Frontend (Cloudflare Pages)
        add_header 'Access-Control-Allow-Origin' 'https://filedrive-ctx.pages.dev' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # Handle Preflight (CORS)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://filedrive-ctx.pages.dev' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}