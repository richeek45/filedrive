server {
    listen 80;
    # server_name localhost;
    server_name 34.101.234.31.sslip.io; # production
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 34.101.234.31.sslip.io;

    # You must generate these via Certbot (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/34.101.234.31.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/34.101.234.31.sslip.io/privkey.pem;

    location /api {
        proxy_pass http://go_backend:8000;
        proxy_http_version 1.1;
        
        # CRITICAL: This tells your Go backend the request came in via HTTPS
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; 

        # CORS Headers
        add_header 'Access-Control-Allow-Origin' 'https://filedrive-ctx.pages.dev' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
}
