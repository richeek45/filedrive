services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: . # Build from current root directory
      dockerfile: Dockerfile.backend # Dockerfile.dev for prod
    container_name: go_backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SSL_MODE: disable
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}
      AWS_OIDC_AUDIENCE: ${AWS_OIDC_AUDIENCE}
      AWS_ROLE_ARN: ${AWS_ROLE_ARN}
      PORT: ${PORT}
      LOCATION: ${LOCATION}
      FRONTEND_URL: ${FRONTEND_URL}
      GO_ENV: ${GO_ENV}
      BACKEND_DOMAIN: ${BACKEND_DOMAIN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL}
      JWT_SECRET: ${JWT_SECRET}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      # GOOGLE_APPLICATION_CREDENTIALS: /app/sa.json # for local
    depends_on:
      jaeger:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    # For development with hot-reload (optional)
    volumes:
      # - ./gcp-service-account.json:/app/sa.json # for local
      - ./:/app # Mount entire root for development
      - /app/tmp # Exclude temp folder if using air for hot-reload

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - app-network

  # Jaeger: The Tracing Backend
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - app-network
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC (Where Go sends traces)
      - "4318:4318" # OTLP HTTP

  # Prometheus: The Metrics Store
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      # This maps the name "backend_host" to whatever IP you provide.
      # If BACKEND_IP is empty, it defaults to host.docker.internal.
      - "backend_host:${BACKEND_IP:-host-gateway}"
    networks:
      - app-network
    ports:
      - "9090:9090"
volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
